<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>murmuration</title>
  <meta name="description" content="Move the birds, get a painting or whatever. There is also chat to talk to other bird wranglers. And you can interact">
  <meta property="og:title" content="Lazy? Paint With Simulated Birds">
  <meta property="og:description" content="Move the birds, get a painting or whatever. There is also chat to talk to other bird wranglers. And you can interact">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://notactuallytreyanastasio.github.io/murmuration/">
  <meta property="og:image" content="https://notactuallytreyanastasio.github.io/murmuration/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lazy? Paint With Simulated Birds">
  <meta name="twitter:description" content="Move the birds, get a painting or whatever. There is also chat to talk to other bird wranglers. And you can interact">
  <meta name="twitter:image" content="https://notactuallytreyanastasio.github.io/murmuration/og.png">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0c10;
      color: #c9c4b4; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    .wordmark { position: fixed; top: 14px; left: 16px; font-size: 13px;
      letter-spacing: .35em; text-transform: uppercase; opacity: .55; user-select: none; }
    .hud { position: fixed; left: 16px; bottom: 14px; font-size: 12px;
      display: flex; gap: 10px; align-items: center; opacity: .8; }
    .hud .seed { opacity: .95; }
    .hud button { background: none; border: 1px solid #3a3d46; color: #c9c4b4;
      font: inherit; padding: 3px 10px; border-radius: 99px; cursor: pointer; }
    .hud button:hover { border-color: #c9c4b4; }
    .presence { position: fixed; top: 14px; right: 16px; font-size: 12px;
      opacity: .55; letter-spacing: .08em; user-select: none; }
    .chat { position: fixed; right: 16px; bottom: 14px; width: min(300px, 72vw);
      display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
    .chat-log { display: flex; flex-direction: column; gap: 5px;
      max-height: 38vh; overflow-y: auto; scrollbar-width: none;
      mask-image: linear-gradient(to bottom, transparent, black 18%);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 18%); }
    .msg { line-height: 1.45; overflow-wrap: break-word;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .85); }
    .msg .who { font-weight: 700; margin-right: 6px; }
    .msg.system { opacity: .5; font-style: italic; }
    .chat input { width: 100%; box-sizing: border-box; font: inherit;
      background: rgba(11, 12, 16, .6); border: 1px solid #3a3d46;
      border-radius: 99px; color: #c9c4b4; padding: 6px 12px; outline: none; }
    .chat input:focus { border-color: #c9c4b4; }
    .chat input:disabled { opacity: .45; }

    .roost-panel { position: fixed; left: 16px; bottom: 52px;
      width: min(300px, 80vw); max-height: 42vh; overflow-y: auto;
      background: rgba(11, 12, 16, .82); border: 1px solid #3a3d46;
      border-radius: 12px; padding: 12px 14px; font-size: 12px;
      backdrop-filter: blur(4px); }
    .roost-panel .roost-title { text-transform: uppercase;
      letter-spacing: .18em; font-size: 10px; opacity: .55;
      margin-bottom: 8px; }
    .roost-entry { display: flex; align-items: baseline; gap: 8px;
      padding: 4px 0; }
    .roost-entry .rname { font-weight: 700; }
    .roost-entry .rmeta { opacity: .55; flex: 1; font-size: 11px; }
    .roost-entry .rx { background: none; border: none; color: #c9c4b4;
      opacity: .5; cursor: pointer; font: inherit; padding: 0 4px; }
    .roost-entry .rx:hover { opacity: 1; }
    .roost-empty { opacity: .5; font-style: italic; }

    /* ?bare=1 — clean canvas for captures */
    body.bare .wordmark, body.bare .hud, body.bare .presence, body.bare .chat,
    body.bare .roost-panel { display: none; }

    /* ---- small screens ---- */
    @media (max-width: 640px) {
      .wordmark { top: calc(10px + env(safe-area-inset-top)); left: 12px;
        font-size: 11px; letter-spacing: .28em; }
      .presence { top: calc(10px + env(safe-area-inset-top)); right: 12px;
        font-size: 11px; max-width: 48vw; text-align: right; }
      .hud { left: 12px; right: 12px; bottom: auto;
        top: calc(34px + env(safe-area-inset-top));
        font-size: 11px; gap: 8px; flex-wrap: wrap; }
      .hud button { padding: 4px 10px; }
      .chat { left: 12px; right: 12px; width: auto;
        bottom: calc(10px + env(safe-area-inset-bottom)); }
      .roost-panel { left: 12px; right: 12px; width: auto; bottom: auto;
        top: calc(78px + env(safe-area-inset-top)); max-height: 34vh; }
      .chat-log { max-height: 24vh; }
      /* 16px stops iOS Safari from zooming the page on focus */
      .chat input { font-size: 16px; padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div class="wordmark">murmuration</div>
  <div class="hud">
    <span>seed</span><span class="seed" id="hudSeed"></span>
    <button id="copyBtn">copy link</button>
    <button id="newBtn">new flock</button>
    <button id="saveBtn">save png</button>
    <button id="roostBtn">roost</button>
  </div>
  <div class="presence" id="hudPeers">alone in the sky</div>
  <div class="roost-panel" id="roostPanel" hidden>
    <div class="roost-title">flocks you carry</div>
    <div id="roostList"></div>
  </div>
  <div class="chat">
    <div class="chat-log" id="chatLog"></div>
    <form id="chatForm">
      <input id="chatInput" maxlength="280" autocomplete="off"
        placeholder="no one else aloft yet…" disabled>
    </form>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
